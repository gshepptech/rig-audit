<svg xmlns="http://www.w3.org/2000/svg" width="720" height="392" viewBox="0 0 720 392" role="img" aria-label="Example Rig Audit Pro findings panel">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F2027"/>
      <stop offset="0.6" stop-color="#1B343D"/>
      <stop offset="1" stop-color="#2C5364"/>
    </linearGradient>
    <linearGradient id="row" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15323C"/>
      <stop offset="1" stop-color="#102932"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.95" cy="0.0" r="1.0">
      <stop offset="0" stop-color="#7DD3FC" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#7DD3FC" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="720" height="392" rx="18" fill="url(#bg)"/>
  <rect width="720" height="392" rx="18" fill="url(#glow)"/>

  <!-- window chrome -->
  <circle cx="34" cy="34" r="6" fill="#5EEAD4" opacity="0.8"/>
  <circle cx="56" cy="34" r="6" fill="#7DD3FC" opacity="0.55"/>
  <circle cx="78" cy="34" r="6" fill="#9FC6C9" opacity="0.4"/>
  <text x="104" y="40" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Findings</text>
  <rect x="540" y="22" width="156" height="26" rx="13" fill="#5EEAD4" fill-opacity="0.12"/>
  <text x="560" y="39" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7DD3FC">scan: 0.84 s · 3 found</text>

  <!-- FINDING 1: Warning -->
  <g transform="translate(28,68)">
    <rect width="664" height="86" rx="12" fill="url(#row)" stroke="#2C5364" stroke-width="1.2"/>
    <rect x="0" y="0" width="5" height="86" rx="2.5" fill="#FBBF77"/>
    <circle cx="32" cy="30" r="7" fill="#FBBF77"/>
    <text x="52" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">High CPU temperature</text>
    <rect x="262" y="19" width="74" height="20" rx="10" fill="#FBBF77" fill-opacity="0.18"/>
    <text x="276" y="33" font-family="ui-monospace, Menlo, monospace" font-size="10.5" fill="#FBBF77">WARNING</text>
    <text x="52" y="52" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#B9D6D4">CPU package is 97.0 C, at or above the 95 C threshold.</text>
    <text x="52" y="72" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#8FB4B6">Action: check cooler mount, thermal paste, and case airflow.</text>
  </g>

  <!-- FINDING 2: Warning -->
  <g transform="translate(28,166)">
    <rect width="664" height="86" rx="12" fill="url(#row)" stroke="#2C5364" stroke-width="1.2"/>
    <rect x="0" y="0" width="5" height="86" rx="2.5" fill="#FBBF77"/>
    <circle cx="32" cy="30" r="7" fill="#FBBF77"/>
    <text x="52" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Memory below expected baseline</text>
    <rect x="378" y="19" width="74" height="20" rx="10" fill="#FBBF77" fill-opacity="0.18"/>
    <text x="392" y="33" font-family="ui-monospace, Menlo, monospace" font-size="10.5" fill="#FBBF77">WARNING</text>
    <text x="52" y="52" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#B9D6D4">Configured at 4000 MHz; treated as DDR5, baseline 4800 MHz.</text>
    <text x="52" y="72" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#8FB4B6">Action: review BIOS/UEFI memory profile (XMP / EXPO).</text>
  </g>

  <!-- FINDING 3: Info -->
  <g transform="translate(28,264)">
    <rect width="664" height="86" rx="12" fill="url(#row)" stroke="#2C5364" stroke-width="1.2"/>
    <rect x="0" y="0" width="5" height="86" rx="2.5" fill="#7DD3FC"/>
    <circle cx="32" cy="30" r="7" fill="#7DD3FC"/>
    <text x="52" y="30" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Balanced power plan active</text>
    <rect x="316" y="19" width="50" height="20" rx="10" fill="#7DD3FC" fill-opacity="0.18"/>
    <text x="330" y="33" font-family="ui-monospace, Menlo, monospace" font-size="10.5" fill="#7DD3FC">INFO</text>
    <text x="52" y="52" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#B9D6D4">The active Windows power plan is named "Balanced".</text>
    <text x="52" y="72" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#8FB4B6">For context only. Rig Audit Pro never changes this for you.</text>
  </g>

  <text x="28" y="380" font-family="ui-monospace, Menlo, monospace" font-size="10.5" fill="#6E9094">Illustrative example. Findings are read-only observations, never automatic changes.</text>
</svg>
