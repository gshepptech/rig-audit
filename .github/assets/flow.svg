<svg xmlns="http://www.w3.org/2000/svg" width="980" height="320" viewBox="0 0 980 320" role="img" aria-label="Rig Audit Pro pipeline: collect, evaluate, export">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F2027"/>
      <stop offset="0.55" stop-color="#203A43"/>
      <stop offset="1" stop-color="#2C5364"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14313B"/>
      <stop offset="1" stop-color="#102A33"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.1" cy="0.0" r="1.0">
      <stop offset="0" stop-color="#5EEAD4" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#5EEAD4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="980" height="320" rx="20" fill="url(#bg)"/>
  <rect width="980" height="320" rx="20" fill="url(#glow)"/>

  <text x="40" y="50" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff">How a scan works</text>
  <text x="40" y="76" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#9FC6C9">One in-sequence pass. Nothing is written until you press a button.</text>

  <!-- STEP 1: COLLECT -->
  <g transform="translate(40,108)">
    <rect width="270" height="172" rx="14" fill="url(#card)" stroke="#2C5364" stroke-width="1.5"/>
    <circle cx="34" cy="38" r="16" fill="#5EEAD4" fill-opacity="0.16" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="29" y="44" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#5EEAD4">1</text>
    <text x="62" y="34" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">Collect</text>
    <text x="62" y="54" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7DD3FC">8 read-only collectors</text>
    <text x="22" y="84" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#CFE8E6">OS · CPU · GPU · Memory</text>
    <text x="22" y="106" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#CFE8E6">PowerPlan · Sensors</text>
    <text x="22" y="128" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#CFE8E6">Storage · DeviceInventory</text>
    <text x="22" y="154" font-family="ui-monospace, Menlo, monospace" font-size="10.5" fill="#7E9FA3">each guarded by a timeout</text>
  </g>

  <!-- arrow 1 -->
  <g stroke="#5EEAD4" stroke-width="2.5" fill="none">
    <line x1="318" y1="194" x2="350" y2="194"/>
    <polyline points="343,188 351,194 343,200"/>
  </g>

  <!-- STEP 2: EVALUATE -->
  <g transform="translate(358,108)">
    <rect width="270" height="172" rx="14" fill="url(#card)" stroke="#2C5364" stroke-width="1.5"/>
    <circle cx="34" cy="38" r="16" fill="#7DD3FC" fill-opacity="0.16" stroke="#7DD3FC" stroke-width="1.5"/>
    <text x="29" y="44" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#7DD3FC">2</text>
    <text x="62" y="34" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">Evaluate</text>
    <text x="62" y="54" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7DD3FC">5-rule findings engine</text>
    <text x="22" y="84" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#CFE8E6">Low memory speed</text>
    <text x="22" y="105" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#CFE8E6">Balanced power plan</text>
    <text x="22" y="126" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#CFE8E6">High CPU temp · Low space</text>
    <text x="22" y="154" font-family="ui-monospace, Menlo, monospace" font-size="10.5" fill="#7E9FA3">plain-language guidance</text>
  </g>

  <!-- arrow 2 -->
  <g stroke="#5EEAD4" stroke-width="2.5" fill="none">
    <line x1="636" y1="194" x2="668" y2="194"/>
    <polyline points="661,188 669,194 661,200"/>
  </g>

  <!-- STEP 3: EXPORT -->
  <g transform="translate(676,108)">
    <rect width="264" height="172" rx="14" fill="url(#card)" stroke="#2C5364" stroke-width="1.5"/>
    <circle cx="34" cy="38" r="16" fill="#5EEAD4" fill-opacity="0.16" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="29" y="44" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#5EEAD4">3</text>
    <text x="62" y="34" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">Export</text>
    <text x="62" y="54" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#7DD3FC">share-safe, local only</text>
    <text x="22" y="84" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#CFE8E6">RigSnapshot.json</text>
    <text x="22" y="105" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#CFE8E6">scan.log + compare</text>
    <text x="22" y="126" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#CFE8E6">redaction on by default</text>
    <text x="22" y="154" font-family="ui-monospace, Menlo, monospace" font-size="10.5" fill="#7E9FA3">%LOCALAPPDATA%\RigAuditPro</text>
  </g>
</svg>
